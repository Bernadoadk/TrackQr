# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "ba7d96a8b17c88a2da158493ba43fd68"
name = "TrackQr-dev"
application_url = "https://example.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  # ── Compliance webhooks (GDPR) — déclarés dans le Partner Dashboard via
  # cette section spéciale, PAS comme des subscriptions classiques.
  [webhooks.privacy_compliance]
  customer_deletion_url      = "/webhooks/customers/redact"
  customer_data_request_url  = "/webhooks/customers/data_request"
  shop_deletion_url          = "/webhooks/shop/redact"

  # ── Webhooks applicatifs classiques
  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/webhooks/app/subscriptions_update"

  # ⚠ orders/create et orders/paid contiennent des "protected customer data"
  # (nom, email, adresse client). L'app DOIT être approuvée pour ces données
  # par Shopify — voir la procédure plus bas.
  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "/webhooks/orders/paid"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# write_products  — includes product reads needed for the QR Create page product picker
# write_discounts — includes discount reads needed for the QR promo type
# read_orders    — needed for order webhook attribution
scopes = "write_products,write_discounts,read_orders,write_metaobjects,write_metaobject_definitions"

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"
